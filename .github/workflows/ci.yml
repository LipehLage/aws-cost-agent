name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          pip install pytest
      - name: Rodar testes
        run: pytest -v
      - name: Smoke test do modo demo
        run: python -m cost_agent --demo
